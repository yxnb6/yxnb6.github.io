<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC28 预测走势</title>
    <style>
        /* 全局样式 */
        body {
            margin: 0;
            padding: 0;
            font-family: "Arial", sans-serif;
            background-color: #ffffff;
            color: #333;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        /* 顶部标签样式 */
        .tabs {
            display: flex;
            border-bottom: 1px solid #ddd;
            background-color: #f9f9f9;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 15px;
            color: #555;
        }

        .tab.active {
            background-color: #3B82F6;
            color: #fff;
            font-weight: bold;
        }

        .tab:hover {
            background-color: #e6f2ff;
        }

        /* 面板样式 */
        .panel {
            display: none;
            padding: 16px;
        }

        .panel.active {
            display: block;
        }

        /* 表格样式 */
        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        .table th, .table td {
            border: 1px solid #ddd;
            padding: 12px 8px;
            text-align: center;
        }

        .table th {
            background-color: #f9f9f9;
            font-weight: bold;
            color: #555;
        }

        /* 样式 - 红色数字球 */
        .number-ball {
            display: inline-flex;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #ef4444;
            color: #fff;
            font-size: 14px;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* 样式 - 预测按钮 */
        .predict-btn {
            display: inline-block;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            border-radius: 16px;
            cursor: default;
        }

        .predict-btn.blue {
            background-color: #3b82f6;
        }

        .predict-btn.red {
            background-color: #ef4444;
        }

        /* 样式 - 结果标志 */
        .result-circle {
            display: inline-block;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 12px;
            color: #fff;
            font-weight: bold;
            line-height: 28px;
            text-align: center;
        }

        .result-circle.correct {
            background-color: #22c55e;
        }

        .result-circle.wrong {
            background-color: #ef4444;
        }
    </style>
</head>
<body>
    <!-- 顶部标签 -->
    <div class="tabs">
        <button class="tab active" data-panel="predict">预测</button>
        <button class="tab" data-panel="trend">走势</button>
        <button class="tab" data-panel="stats">统计</button>
    </div>

    <!-- 面板内容 -->
    <div id="content">
        <!-- 预测面板 -->
        <div id="predictPanel" class="panel active">
            <table class="table">
                <thead>
                    <tr>
                        <th>期号</th>
                        <th>号码</th>
                        <th>预测</th>
                        <th>结果</th>
                    </tr>
                </thead>
                <tbody id="predictTableBody"></tbody>
            </table>
        </div>

        <!-- 走势面板 -->
        <div id="trendPanel" class="panel">
            <p>走势数据加载中...</p>
        </div>

        <!-- 统计面板 -->
        <div id="statsPanel" class="panel">
            <p>统计数据加载中...</p>
        </div>
    </div>

    <script>
        // 页面切换功能
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function () {
                // 切换标签样式
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');

                // 切换面板显示
                const target = this.dataset.panel;
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.getElementById(target + 'Panel').classList.add('active');
            });
        });

        // 模拟数据加载【您可以替换为实际的预测数据】
        const mockData = [
            { issue: 34123, numbers: [8, 13, 5], prediction: '双', result: true },
            { issue: 34124, numbers: [6, 7, 4], prediction: '单', result: false },
            { issue: 34125, numbers: [9, 2, 14], prediction: '单', result: true },
            { issue: 34126, numbers: [10, 3, 1], prediction: '双', result: true },
        ];

        // 算法：基于奇偶判断的预测
        function generatePrediction(numbers) {
            const sum = numbers.reduce((a, b) => a + b, 0);
            return sum % 2 === 0 ? '双' : '单'; // 偶数和 -> 双，奇数和 -> 单
        }

        // 渲染表格
        function renderTableRows(data) {
            const body = document.getElementById('predictTableBody');
            body.innerHTML = '';

            data.forEach(row => {
                const { issue, numbers, prediction, result } = row;

                const numberBalls = numbers.map(num => `<span class="number-ball">${num}</span>`).join('');
                const predictionClass = prediction === '双' ? 'blue' : 'red';
                const resultClass = result ? 'correct' : 'wrong';
                const resultText = result ? '中' : '错';

                body.innerHTML += `
                    <tr>
                        <td>${issue}</td>
                        <td>${numberBalls}</td>
                        <td><span class="predict-btn ${predictionClass}">${prediction}</span></td>
                        <td><span class="result-circle ${resultClass}">${resultText}</span></td>
                    </tr>
                `;
            });
        }

        // 初始加载模拟数据
        function init() {
            const processedData = mockData.map(row => ({
                ...row,
                prediction: generatePrediction(row.numbers), // 调用算法生成预测
            }));
            renderTableRows(processedData);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
