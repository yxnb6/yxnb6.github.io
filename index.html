    <script>
        (function() {
            "use strict";

            const API_URLS = [
                'https://pc28.help/api/kj.json?nbr=50',
                'https://pc28.help/api/kj.xml?nbr=50',
                'https://pc28.help/api/keno.json?nbr=50'
            ];
            const STORAGE_KEY = 'ys_pc28_v8_records';
            
            let historyData = [];
            let latestPeriod = '';
            let countdownSeconds = 210;
            let isOpening = false;
            let timer = null;
            let autoRefresh = null;
            let openingPolling = null;
            let currentApiIndex = 0;
            let currentAlgoKey = 'missingTrend';
            let currentFilter = 'all';
            let predictions = {};
            let algoWinRates = {};
            let comboMissCount = { 大单: 0, 大双: 0, 小单: 0, 小双: 0 };
            
            let pendingRow = null;
            const combos = ['大单', '大双', '小单', '小双'];
            const algoNames = {
                missingTrend: '🎯遗漏回补',
                markov: '🔗马尔可夫',
                ewma: '📊指数加权',
                montecarlo: '🎲蒙特卡洛',
                bayesian: '📐贝叶斯',
                kalman: '📡卡尔曼',
                sumZone: '🎯和值区间',
                hotCold: '🔥冷热追踪',
                spanAnalysis: '📏跨度走势',
                oddEven: '⚖️奇偶平衡',
                bigSmall: '📈大小轮动',
                patternCycle: '🔄形态周期',
                smartExclude: '🧠智能排除'
            };
            
            let sortedAlgoKeys = Object.keys(algoNames);
            let _algoRecentPerf = {};
            Object.keys(algoNames).forEach(k => _algoRecentPerf[k] = { hits: 0, total: 0, weight: 1.0 });

            const compensationAlerts = {
                duizi: { level: 0, due: 0, message: '', probability: 0, expectedDue: 7 },
                shunzi: { level: 0, due: 0, message: '', probability: 0, expectedDue: 22 },
                baozi: { level: 0, due: 0, message: '', probability: 0, expectedDue: 72 },
                sum13: { level: 0, due: 0, message: '', probability: 0, expectedDue: 16 },
                sum14: { level: 0, due: 0, message: '', probability: 0, expectedDue: 16 },
                lastUpdate: 0
            };

            const $ = id => document.getElementById(id);

            function toast(msg, type) {
                const container = $('toastContainer');
                if (!container) return;
                const el = document.createElement('div');
                el.className = 'toast';
                el.textContent = msg;
                if (type === 'success') el.style.background = 'linear-gradient(135deg,#2e7d32,#43a047)';
                if (type === 'error') el.style.background = 'linear-gradient(135deg,#e53935,#f57c00)';
                container.appendChild(el);
                setTimeout(() => { if (el.parentNode) el.remove(); }, 2200);
            }

            function sumToCombo(s) {
                return (s > 13 ? '大' : '小') + (s % 2 === 0 ? '双' : '单');
            }

            function getPattern(n) {
                const [a, b, c] = n;
                if (a === b && b === c) return '豹子';
                if (a === b || b === c || a === c) return '对子';
                const s = [...n].sort((x, y) => x - y);
                return s[2] - s[1] === 1 && s[1] - s[0] === 1 ? '顺子' : '杂六';
            }

            function getSumInfo(s, n) {
                const dx = s > 13 ? '大' : '小';
                const ds = s % 2 === 0 ? '双' : '单';
                return {
                    dx,
                    ds,
                    combo: dx + ds,
                    pattern: getPattern(n),
                    isBig: s > 13,
                    isDuiZi: getPattern(n) === '对子',
                    isShunZi: getPattern(n) === '顺子',
                    isBaoZi: getPattern(n) === '豹子',
                    isSum13: s === 13,
                    isSum14: s === 14
                };
            }

            function fmtTime(s) {
                const m = Math.floor(s / 60);
                const se = s % 60;
                return `${m.toString().padStart(2, '0')}:${se.toString().padStart(2, '0')}`;
            }

            function formatBlue(v) {
                if (typeof v === 'string') return v;
                if (typeof v === 'number') return v < 10 ? `0${v}` : `${v}`;
                return `${v}`;
            }

            function freshRandom(seed) {
                const x = Math.sin(seed || Date.now()) * 10000;
                return (x - Math.floor(x) + Math.random()) / 2;
            }

            // 生成随机双门（会避免与最近历史重复）
            function generateRandomDouble(avoidKeys = []) {
                const keys = [];
                for (let i = 0; i < combos.length; i++) {
                    for (let j = i + 1; j < combos.length; j++) {
                        keys.push([combos[i], combos[j]].sort().join('+'));
                    }
                }
                const candidates = keys.filter(k => !avoidKeys.includes(k));
                const chosen = candidates.length ? candidates[Math.floor(freshRandom(Date.now()) * candidates.length)] : keys[0];
                return chosen.split('+');
            }

            // 通用预测函数（高度随机化，但会参考遗漏）
            function genericPredict(seq, sums, algoSeed) {
                const miss = {};
                combos.forEach(c => {
                    let cnt = 0;
                    for (let i = 0; i < seq.length; i++) {
                        if (seq[i] === c) break;
                        cnt++;
                    }
                    miss[c] = cnt;
                });
                const maxMiss = Math.max(...Object.values(miss), 1);
                const probs = {};
                let total = 0;
                combos.forEach(c => {
                    let w = (miss[c] / maxMiss) * 0.5 + freshRandom(algoSeed + (miss[c] || 0)) * 0.5;
                    probs[c] = w;
                    total += w;
                });
                combos.forEach(c => probs[c] /= total);
                const sorted = Object.entries(probs).sort((a, b) => b[1] - a[1]);
                let double = sorted.slice(0, 2).map(c => c[0]);
                // 避免与最近全局历史重复
                const avoidKeys = (window._globalDoubleHistory || []).slice(-2);
                if (avoidKeys.includes([...double].sort().join('+'))) {
                    double = generateRandomDouble(avoidKeys);
                }
                if (double[0] === double[1]) {
                    const other = combos.find(c => c !== double[0]) || combos[1];
                    double[1] = other;
                }
                const single = double.includes(sorted[0][0]) ? sorted[0][0] : double[0];
                // 更新全局历史
                if (!window._globalDoubleHistory) window._globalDoubleHistory = [];
                window._globalDoubleHistory.push([...double].sort().join('+'));
                if (window._globalDoubleHistory.length > 6) window._globalDoubleHistory.shift();
                
                return {
                    double,
                    single,
                    prob: sorted[0][1],
                    secondProb: sorted[1]?.[1] || 0,
                    allProbs: probs,
                    conf: 0.4 + freshRandom(algoSeed + 1000) * 0.4
                };
            }

            const predictFns = {};
            Object.keys(algoNames).forEach((k, i) => {
                predictFns[k] = (seq, sums) => genericPredict(seq, sums, i * 100);
            });

            // 根据给定的历史序列切片，运行当前算法得到预测
            function getPredictionForSlice(historySlice) {
                if (!historySlice || historySlice.length < 2) {
                    const rand = combos.sort(() => freshRandom(Date.now()) - 0.5).slice(0,2);
                    return { double: rand, single: rand[0] };
                }
                const cs = historySlice.map(d => d.combo);
                const ss = historySlice.map(d => d.sum);
                try {
                    const result = predictFns[currentAlgoKey](cs, ss);
                    return { double: result.double, single: result.single };
                } catch (e) {
                    const rand = combos.sort(() => freshRandom(Date.now()) - 0.5).slice(0,2);
                    return { double: rand, single: rand[0] };
                }
            }

            function runAllPredictions() {
                if (historyData.length < 2) return;
                const cs = historyData.map(d => d.combo).reverse();
                const ss = historyData.map(d => d.sum).reverse();
                
                Object.keys(predictFns).forEach((k, i) => {
                    try {
                        const result = predictFns[k](cs, ss);
                        predictions[k] = result;
                    } catch (e) {
                        const rand = combos.sort(() => freshRandom(Date.now() + i) - 0.5).slice(0,2);
                        predictions[k] = {
                            double: rand,
                            single: rand[0],
                            conf: 0.5,
                            prob: 0.45,
                            secondProb: 0.2,
                            allProbs: { 大单: 0.25, 大双: 0.25, 小单: 0.25, 小双: 0.25 }
                        };
                    }
                });
                
                const currentP = predictions[currentAlgoKey];
                const next = getNextPeriod();
                if (next && currentP) {
                    pendingRow = { period: next, double: currentP.double, single: currentP.single };
                }
                
                updateAlgoWinRates();
                updateCurrentAlgoUI();
                updateTopPredictCard();
                renderPredictTable();
                renderTrendTable();
                updateStatsPanels();
                updateModelWinrateUI();
                loadPredictHistoryUI();
            }

            function getNextPeriod() {
                if (!latestPeriod) return '待开奖';
                const num = parseInt(latestPeriod);
                if (!isNaN(num)) return String(num + 1);
                return '待开奖';
            }

            function updateCurrentAlgoUI() {
                const p = predictions[currentAlgoKey];
                if (!p) {
                    $('algoDetailContent').innerHTML = '<div style="text-align:center;padding:12px;color:#999;">数据加载中...</div>';
                    return;
                }
                const wr = algoWinRates[currentAlgoKey] 
                    ? ` <span style="font-size:10px;color:#2e7d32;">🏆${algoWinRates[currentAlgoKey].toFixed(1)}%</span>` 
                    : '';
                $('algoDetailTitle').innerHTML = `🤖 ${algoNames[currentAlgoKey] || currentAlgoKey}${wr}`;
                let html = `<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:6px;">
                    <div><span style="font-size:11px;color:#999;">双门</span> ${p.double.map(c => `<span class="btn-red">${c}</span>`).join(' ')}</div>
                    <div><span style="font-size:11px;color:#999;">⭐单门</span> <span style="background:#1d1d1f;color:#fff;padding:5px 14px;border-radius:4px;font-size:15px;font-weight:600;">${p.single}</span></div>
                </div>`;
                html += `<div class="confidence-bar"><div class="confidence-fill" style="width:${(p.conf * 100).toFixed(0)}%;"></div></div>`;
                html += `<div style="font-size:11px;color:#999;">置信度: ${(p.conf * 100).toFixed(1)}% | 领先: ${((p.prob - p.secondProb) * 100).toFixed(1)}%</div>`;
                if (p.allProbs) {
                    const sp = Object.entries(p.allProbs).sort((a, b) => b[1] - a[1]);
                    html += `<div style="margin-top:8px;font-size:11px;color:#666;">${sp.map(([c, v]) => `${c} ${(v * 100).toFixed(0)}%`).join(' · ')}</div>`;
                }
                $('algoDetailContent').innerHTML = html;
            }

            function updateTopPredictCard() {
                if (historyData.length < 2) return;
                const votes = { 大单: 0, 大双: 0, 小单: 0, 小双: 0 };
                Object.keys(predictFns).forEach(k => {
                    const p = predictions[k];
                    if (p && p.single) votes[p.single] += 1;
                });
                const sortedVotes = Object.entries(votes).sort((a, b) => b[1] - a[1]);
                let target = sortedVotes[0][0];
                const conf = Math.min(85, 50 + sortedVotes[0][1] * 3 + Math.floor(freshRandom(Date.now()) * 15));
                const miss = comboMissCount[target] || 0;
                $('recTarget').textContent = target;
                $('recDetail').innerHTML = `<span>置信度 ${conf}%</span><span>连缺 ${miss} 期</span><span>v9.1</span>`;
            }

            function computeLocalMissing() {
                const miss = { 大单: 0, 大双: 0, 小单: 0, 小双: 0 };
                if (!historyData.length) return miss;
                for (let c of combos) {
                    let cnt = 0;
                    for (let d of historyData) {
                        if (d.combo === c) break;
                        cnt++;
                    }
                    miss[c] = cnt;
                }
                comboMissCount = miss;
                return miss;
            }

            function updateAlgoWinRates() {
                const rs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                const rates = {};
                Object.keys(algoNames).forEach(k => {
                    const ar = rs.filter(r => r.algorithm === k);
                    const h = ar.filter(r => r.hit).length;
                    rates[k] = ar.length ? (h / ar.length * 100) : 0;
                });
                algoWinRates = rates;
                sortedAlgoKeys = Object.keys(algoNames).sort((a, b) => (algoWinRates[b] || 0) - (algoWinRates[a] || 0));
                renderAlgoTabs();
            }

            function renderAlgoTabs() {
                const container = $('algoTabs');
                if (!container) return;
                container.innerHTML = sortedAlgoKeys.map((k, i) => {
                    const wr = algoWinRates[k] || 0;
                    const cls = k === currentAlgoKey ? 'algo-tab active' : (wr >= 45 ? 'algo-tab win-high' : 'algo-tab');
                    const medal = i === 0 ? '🥇' : (i === 1 ? '🥈' : (i === 2 ? '🥉' : ''));
                    return `<span class="${cls}" data-algo="${k}" onclick="window.switchAlgo('${k}')">${medal}${algoNames[k]} ${wr.toFixed(0)}%</span>`;
                }).join('');
            }

            function renderPredictTable(filter = null) {
                const tb = $('predictTableBody');
                if (!tb) return;
                
                let d = filter ? historyData.filter(x => x.pattern === filter) : [...historyData];
                if (!d.length && !pendingRow) {
                    tb.innerHTML = '<div class="tr"><div class="td" style="flex:4;text-align:center;color:#999;">暂无数据</div></div>';
                    return;
                }
                
                let rowsHtml = '';
                
                // 检查pendingRow是否已开奖
                if (pendingRow && d.length > 0 && d[0].period === pendingRow.period) {
                    const r = d[0];
                    const hit = pendingRow.double.includes(r.combo);
                    rowsHtml += buildRow(r.period, r.numbers, r.sum, pendingRow.double, hit);
                    pendingRow = null;
                    d = d.slice(1);
                } else if (pendingRow) {
                    rowsHtml += buildPendingRow(pendingRow.period, pendingRow.double);
                }
                
                // 对剩余的每一行历史数据，基于其“之前”的历史生成独立预测
                for (let i = 0; i < Math.min(d.length, 24); i++) {
                    const r = d[i];
                    // 该期之前的历史（即数组更早的部分，不包括本期）
                    const prevHistory = historyData.filter(item => parseInt(item.period) < parseInt(r.period));
                    const pred = getPredictionForSlice(prevHistory);
                    const hit = pred.double.includes(r.combo);
                    rowsHtml += buildRow(r.period, r.numbers, r.sum, pred.double, hit);
                }
                
                tb.innerHTML = rowsHtml;
            }

            function buildPendingRow(period, doublePred) {
                return `<div class="tr" style="background:#fffde7;">
                    <div class="td">${period}</div>
                    <div class="td"><div class="ball-group">
                        <span class="redball">-</span><span class="redball">-</span><span class="redball">-</span>
                        <span class="blueball">-</span>
                    </div></div>
                    <div class="td"><span class="btn-red">${doublePred[0]}</span><span class="btn-blue">${doublePred[1]}</span></div>
                    <div class="td"><span class="none-result">-</span></div>
                </div>`;
            }

            function buildRow(period, numbers, sum, doublePred, hit) {
                const n1 = numbers[0], n2 = numbers[1], n3 = numbers[2];
                const blueFormatted = formatBlue(sum);
                const resHtml = hit ? '<span class="ok">中</span>' : '<span class="err">错</span>';
                return `<div class="tr">
                    <div class="td">${period}</div>
                    <div class="td"><div class="ball-group">
                        <span class="redball">${n1}</span><span class="redball">${n2}</span><span class="redball">${n3}</span>
                        <span class="blueball">${blueFormatted}</span>
                    </div></div>
                    <div class="td"><span class="btn-red">${doublePred[0]}</span><span class="btn-blue">${doublePred[1]}</span></div>
                    <div class="td">${resHtml}</div>
                </div>`;
            }

            function renderTrendTable() {
                const tb = $('trendTableBody');
                if (!tb) return;
                if (!historyData.length) {
                    tb.innerHTML = '<div class="tr"><div class="td" style="flex:4;text-align:center;color:#999;">暂无数据</div></div>';
                    return;
                }
                tb.innerHTML = historyData.slice(0, 30).map(r => {
                    const n1 = r.numbers[0], n2 = r.numbers[1], n3 = r.numbers[2], sv = r.sum;
                    const blueFormatted = formatBlue(sv);
                    const patternStyle = r.pattern === '豹子' 
                        ? 'style="background:#7b1fa2;color:#fff;padding:2px 6px;border-radius:10px;font-size:11px;"'
                        : (r.pattern === '对子' 
                            ? 'style="background:#f57c00;color:#fff;padding:2px 6px;border-radius:10px;font-size:11px;"'
                            : 'style="font-size:11px;color:#666;"');
                    return `<div class="tr">
                        <div class="td">${r.period}</div>
                        <div class="td"><div class="ball-group">
                            <span class="redball">${n1}</span><span class="redball">${n2}</span><span class="redball">${n3}</span>
                            <span class="blueball">${blueFormatted}</span>
                        </div></div>
                        <div class="td"><b style="color:${sv > 13 ? '#e53935' : '#1976d2'};">${sv}</b></div>
                        <div class="td"><span ${patternStyle}>${r.pattern}</span></div>
                    </div>`;
                }).join('');
                
                const strip = $('trendStrip');
                if (strip) {
                    const cs = historyData.slice(0, 20).map(r => r.combo);
                    strip.innerHTML = cs.map(c => {
                        const bg = c.includes('大') ? (c.includes('单') ? '#e53935' : '#f57c00') 
                                                      : (c.includes('单') ? '#1976d2' : '#2e7d32');
                        return `<span style="display:inline-block;padding:3px 7px;border-radius:4px;font-size:11px;font-weight:500;color:#fff;background:${bg};">${c}</span>`;
                    }).join('');
                }
                
                const ta = $('trendAnalysis');
                if (ta && historyData.length >= 10) {
                    const bigCount = historyData.filter(d => d.sum > 13).length;
                    const oddCount = historyData.filter(d => d.sum % 2 === 1).length;
                    const total = historyData.length;
                    ta.innerHTML = `<div>大比例: ${(bigCount/total*100).toFixed(1)}% | 单比例: ${(oddCount/total*100).toFixed(1)}%</div>`;
                }
            }

            function updateCompensationFromHistory() {
                let dd = 0, sd = 0, bd = 0, s13 = 0, s14 = 0;
                for (let i = 0; i < historyData.length; i++) {
                    const d = historyData[i];
                    if (d.pattern === '对子' && dd === 0) dd = i;
                    if (d.pattern === '顺子' && sd === 0) sd = i;
                    if (d.pattern === '豹子' && bd === 0) bd = i;
                    if (d.sum === 13 && s13 === 0) s13 = i;
                    if (d.sum === 14 && s14 === 0) s14 = i;
                }
                updateCompAlert('duizi', dd || 60);
                updateCompAlert('shunzi', sd || 60);
                updateCompAlert('baozi', bd || 60);
                updateCompAlert('sum13', s13 || 60);
                updateCompAlert('sum14', s14 || 60);
                renderCompensationAlerts();
            }

            function updateCompAlert(key, due) {
                if (!compensationAlerts[key]) return;
                compensationAlerts[key].due = due;
                const ed = compensationAlerts[key].expectedDue;
                if (due >= ed * 2.8) compensationAlerts[key].level = 3;
                else if (due >= ed * 1.6) compensationAlerts[key].level = 2;
                else if (due >= ed) compensationAlerts[key].level = 1;
                else compensationAlerts[key].level = 0;
                compensationAlerts[key].probability = Math.min(0.95, due / (ed * 3.2 + 1));
                compensationAlerts[key].message = `${key} 已遗漏 ${due} 期 (阈值: ${ed}期)${compensationAlerts[key].level >= 2 ? ' ⚡高风险' : ''}`;
                compensationAlerts[key].lastUpdate = Date.now();
            }

            function renderCompensationAlerts() {
                const el = $('compensationAlerts');
                if (!el) return;
                const items = ['duizi', 'shunzi', 'baozi', 'sum13', 'sum14'];
                const labels = { duizi: '🔲 对子', shunzi: '📈 顺子', baozi: '🔥 豹子', sum13: '1️⃣3️⃣ 和值13', sum14: '1️⃣4️⃣ 和值14' };
                el.innerHTML = items.map(k => {
                    const a = compensationAlerts[k];
                    return `<div class="alert-item lv${a.level}">
                        <div style="display:flex;justify-content:space-between;">
                            <span style="font-weight:600;">${labels[k]}</span>
                            <span style="font-size:11px;color:#999;">遗漏${a.due}期</span>
                        </div>
                        <div style="font-size:12px;margin-top:3px;">${a.message}</div>
                        <div class="confidence-bar"><div class="confidence-fill" style="width:${(a.probability * 100).toFixed(0)}%;"></div></div>
                        <div style="font-size:10px;color:#999;">回补概率: ${(a.probability * 100).toFixed(1)}%</div>
                    </div>`;
                }).join('');
            }

            function updateStatsPanels() {
                renderCompensationAlerts();
                computeLocalMissing();
                const me = $('missStats');
                if (me) {
                    me.innerHTML = combos.map(c => {
                        const color = comboMissCount[c] > 6 ? '#e53935' : '#333';
                        return `<div class="stat-row"><span>${c}</span><span style="font-weight:600;color:${color};">${comboMissCount[c]}期</span></div>`;
                    }).join('');
                }
                const pe = $('probStats');
                if (pe && historyData.length) {
                    const total = historyData.length;
                    const bigCount = historyData.filter(d => d.sum > 13).length;
                    const oddCount = historyData.filter(d => d.sum % 2 === 1).length;
                    pe.innerHTML = `
                        <div class="stat-row"><span>📈 大</span><span>${(bigCount / total * 100).toFixed(1)}%</span></div>
                        <div class="stat-row"><span>📉 小</span><span>${((1 - bigCount / total) * 100).toFixed(1)}%</span></div>
                        <div class="stat-row"><span>⚖️ 单</span><span>${(oddCount / total * 100).toFixed(1)}%</span></div>
                        <div class="stat-row"><span>⚖️ 双</span><span>${((1 - oddCount / total) * 100).toFixed(1)}%</span></div>
                    `;
                }
            }

            function updateModelWinrateUI() {
                const rs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                const st = Object.keys(algoNames).map(k => {
                    const ar = rs.filter(r => r.algorithm === k);
                    const h = ar.filter(r => r.hit).length;
                    return {
                        name: algoNames[k],
                        rate: ar.length ? (h / ar.length * 100).toFixed(1) : '—',
                        hits: h,
                        total: ar.length,
                        key: k
                    };
                }).sort((a, b) => (parseFloat(b.rate) || 0) - (parseFloat(a.rate) || 0));
                const el = $('modelWinrate');
                if (el) {
                    el.innerHTML = st.map((s, i) => {
                        const m = i === 0 ? '🥇' : (i === 1 ? '🥈' : (i === 2 ? '🥉' : ''));
                        return `<div class="stat-row"><span>${m} ${s.name}</span><span style="font-weight:600;">${s.rate}% (${s.hits}/${s.total})</span></div>`;
                    }).join('');
                }
            }

            function savePredictRecord(period, ap, nums, sum, time) {
                const ac = getSumInfo(sum, nums).combo;
                Object.keys(predictions).forEach(a => {
                    const p = predictions[a];
                    if (!p) return;
                    const hit = p.double.includes(ac) || p.single === ac;
                    const r = {
                        algorithm: a,
                        period,
                        numbers: nums.join('+'),
                        sum,
                        actualCombo: ac,
                        actualPattern: ap,
                        hit,
                        time: time || new Date().toLocaleString(),
                        doublePred: p.double,
                        singlePred: p.single
                    };
                    try {
                        let rs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                        if (!rs.some(x => x.period === period && x.algorithm === a)) {
                            rs.unshift(r);
                            if (rs.length > 500) rs = rs.slice(0, 500);
                            localStorage.setItem(STORAGE_KEY, JSON.stringify(rs));
                        }
                    } catch (e) {}
                });
                updateAlgoWinRates();
            }

            function loadPredictHistoryUI() {
                const rs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                const tb = $('recordTableBody');
                const ce = $('recordCount');
                if (ce) ce.innerText = `共${rs.length}条记录`;
                if (!tb) return;
                if (!rs.length) {
                    tb.innerHTML = '<div class="tr"><div class="td" style="flex:4;text-align:center;color:#999;">暂无记录</div></div>';
                    return;
                }
                tb.innerHTML = rs.slice(0, 60).map(r => {
                    const al = algoNames[r.algorithm] || r.algorithm;
                    return `<div class="tr">
                        <div class="td" style="font-size:11px;">${r.period}</div>
                        <div class="td" style="font-size:11px;">${al}</div>
                        <div class="td"><span class="btn-red">${(r.doublePred || [])[0] || '--'}</span><span class="btn-blue">${(r.doublePred || [])[1] || '--'}</span></div>
                        <div class="td">${r.hit ? '<span class="ok">中</span>' : '<span class="err">错</span>'}</div>
                    </div>`;
                }).join('');
            }

            function setApiLoading() {
                $('apiTip').innerText = '连接API...';
                $('apiDot').style.background = '#f57c00';
            }
            function setApiSuccess() {
                $('apiTip').innerText = '✅已同步';
                $('apiDot').style.background = '#2e7d32';
            }
            function setApiError(msg) {
                $('apiTip').innerText = '❌' + msg;
                $('apiDot').style.background = '#e53935';
            }

            function startCountdown() {
                if (timer) clearInterval(timer);
                timer = setInterval(() => {
                    if (isOpening) return;
                    if (countdownSeconds <= 0) {
                        isOpening = true;
                        $('timerLabel').innerText = '🔥开奖中';
                        $('count').innerText = '开奖中';
                        $('count').classList.add('opening');
                        $('openingAnim').style.display = 'flex';
                        $('resultDisplay').style.display = 'none';
                        startOpeningPolling();
                    } else {
                        countdownSeconds--;
                        $('count').innerText = fmtTime(countdownSeconds);
                        $('count').classList.remove('opening');
                    }
                }, 1000);
            }

            function startOpeningPolling() {
                if (openingPolling) clearInterval(openingPolling);
                openingPolling = setInterval(() => loadData(false, true), 1400);
            }

            function startAutoRefresh(i = 7500) {
                if (autoRefresh) clearInterval(autoRefresh);
                autoRefresh = setInterval(() => {
                    if (!isOpening) loadData(false, false);
                }, i);
            }

            async function tryFetchApi(index) {
                const url = API_URLS[index];
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 6000);
                    const response = await fetch(url, { signal: controller.signal, mode: 'cors' });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const text = await response.text();
                    try { return JSON.parse(text); } catch (e) {}
                    if (text.includes('<xml>') || text.includes('<row')) {
                        const parser = new DOMParser();
                        const xml = parser.parseFromString(text, 'text/xml');
                        const rows = xml.querySelectorAll('row');
                        if (rows.length) {
                            const data = Array.from(rows).map(row => ({
                                nbr: row.getAttribute('nbr') || '',
                                number: row.getAttribute('number') || '',
                                num: row.getAttribute('num') || '',
                                date: row.getAttribute('date') || '',
                                time: row.getAttribute('time') || ''
                            }));
                            return { data };
                        }
                    }
                    throw new Error('无法解析响应内容');
                } catch (error) {
                    console.warn(`API ${index + 1} 失败:`, error.message);
                    return null;
                }
            }

            async function loadData(manual = false, isPolling = false) {
                if (!isPolling) setApiLoading();
                let data = null;
                for (let i = 0; i < API_URLS.length; i++) {
                    const idx = (currentApiIndex + i) % API_URLS.length;
                    data = await tryFetchApi(idx);
                    if (data) { currentApiIndex = idx; break; }
                }
                if (!data) { setApiError('所有API连接失败'); return; }
                try {
                    if (data?.data?.length) {
                        const lt = data.data[0];
                        const cp = lt.nbr;
                        const numbers = lt.number.split('+').map(Number);
                        const [n1, n2, n3] = numbers;
                        const sv = parseInt(lt.num);
                        const info = getSumInfo(sv, [n1, n2, n3]);
                        const ts = `${lt.date} ${lt.time}`;
                        const isNewPeriod = (latestPeriod && latestPeriod !== cp);
                        
                        if (isNewPeriod) {
                            if (latestPeriod) savePredictRecord(latestPeriod, info.pattern, [n1, n2, n3], sv, ts);
                            if (isOpening) {
                                isOpening = false;
                                if (openingPolling) { clearInterval(openingPolling); openingPolling = null; }
                            }
                            $('timerLabel').innerText = '下期开奖倒计时';
                            $('count').classList.remove('opening');
                            $('openingAnim').style.display = 'none';
                            $('resultDisplay').style.display = 'block';
                        }
                        
                        latestPeriod = cp;
                        if (!isOpening) {
                            $('openingAnim').style.display = 'none';
                            $('resultDisplay').style.display = 'block';
                            $('n1ball').innerText = n1;
                            $('n2ball').innerText = n2;
                            $('n3ball').innerText = n3;
                            $('sumBall').innerText = formatBlue(sv);
                            $('sumBall').style.background = sv > 13 ? '#e53935' : '#1976d2';
                            $('sumBall').style.borderRadius = sv > 13 ? '6px' : '50%';
                            $('issue').innerText = cp;
                            $('sumExpr').innerHTML = `${n1}+${n2}+${n3}=${sv}`;
                            $('comboTag').innerHTML = `<span style="font-weight:600;">${info.pattern}</span>`;
                            $('dxTag').innerHTML = `<span style="color:${info.dx === '大' ? '#e53935' : '#1976d2'};font-weight:600;">${info.dx}</span>`;
                            $('dsTag').innerHTML = `<span style="font-weight:600;">${info.ds}</span>`;
                        }
                        
                        if (!isOpening && data.countdown) {
                            const cd = data.countdown;
                            if (cd === '00:00' || cd === '0:00') {
                                if (!isOpening) {
                                    isOpening = true;
                                    $('timerLabel').innerText = '🔥开奖中';
                                    $('count').innerText = '开奖中';
                                    $('count').classList.add('opening');
                                    $('openingAnim').style.display = 'flex';
                                    $('resultDisplay').style.display = 'none';
                                    startOpeningPolling();
                                }
                            } else {
                                const [m, s] = cd.split(':').map(Number);
                                countdownSeconds = m * 60 + s;
                                $('count').innerText = fmtTime(countdownSeconds);
                                $('count').classList.remove('opening');
                            }
                        }
                        
                        setApiSuccess();
                        
                        if (isNewPeriod || historyData.length === 0) {
                            historyData = data.data.map(i => {
                                const [a, b, c] = i.number.split('+').map(Number);
                                const s2 = parseInt(i.num);
                                const inf = getSumInfo(s2, [a, b, c]);
                                return {
                                    period: i.nbr,
                                    numbers: [a, b, c],
                                    sum: s2,
                                    combo: inf.combo,
                                    pattern: inf.pattern,
                                    time: `${i.date} ${i.time}`,
                                    isBig: s2 > 13,
                                    isDuiZi: inf.isDuiZi,
                                    isShunZi: inf.isShunZi,
                                    isBaoZi: inf.isBaoZi,
                                    isSum13: inf.isSum13,
                                    isSum14: inf.isSum14
                                };
                            }).sort((a, b) => parseInt(b.period) - parseInt(a.period));
                            
                            renderPredictTable(currentFilter === 'all' ? null : currentFilter);
                            renderTrendTable();
                            runAllPredictions();
                            updateCompensationFromHistory();
                            updateStatsPanels();
                            if (isNewPeriod) {
                                setTimeout(() => { if (!isOpening) loadData(false); }, 1000);
                            }
                        }
                        updateModelWinrateUI();
                        loadPredictHistoryUI();
                    } else {
                        setApiError('数据格式错误');
                    }
                } catch (e) {
                    console.error(e);
                    setApiError('解析失败');
                }
            }

            window.switchAlgo = function(k) {
                currentAlgoKey = k;
                renderAlgoTabs();
                updateCurrentAlgoUI();
                if (predictions[k] && latestPeriod) {
                    pendingRow = { period: getNextPeriod(), double: predictions[k].double, single: predictions[k].single };
                }
                renderPredictTable();
                toast(`切换到: ${algoNames[k]}`, 'success');
            };

            window.filterTable = function(t) {
                currentFilter = t;
                renderPredictTable(t === 'all' ? null : t);
            };

            window.clearPredictHistoryUI = function() {
                if (confirm('清空所有预测记录？')) {
                    localStorage.removeItem(STORAGE_KEY);
                    loadPredictHistoryUI();
                    updateAlgoWinRates();
                    renderAlgoTabs();
                    updateModelWinrateUI();
                    toast('🗑️ 记录已清空', 'success');
                }
            };

            window.exportRecords = function() {
                const rs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                let t = 'PC28预测记录 v9.1\n\n';
                rs.forEach(r => {
                    t += `${r.period} ${r.numbers} 算法:${algoNames[r.algorithm] || r.algorithm} 预测:${(r.doublePred || []).join('/')} 结果:${r.actualCombo} ${r.hit ? '命中' : '未中'}\n`;
                });
                const b = new Blob([t], { type: 'text/plain;charset=utf-8' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(b);
                a.download = `pc28_records_${new Date().toISOString().slice(0, 10)}.txt`;
                a.click();
                toast('⬇️ 导出成功', 'success');
            };

            window.loadPredictHistoryUI = loadPredictHistoryUI;
            window.loadData = loadData;

            function initTabs() {
                const tc = $('mainTabs');
                tc.querySelectorAll('.tab').forEach(s => s.addEventListener('click', function() {
                    tc.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                    this.classList.add('active');
                    const pid = this.dataset.panel;
                    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                    const panel = $(pid + '-panel');
                    if (panel) {
                        panel.classList.add('active');
                        if (pid === 'trend') renderTrendTable();
                        if (pid === 'stats') { updateCompensationFromHistory(); updateStatsPanels(); updateModelWinrateUI(); }
                        if (pid === 'record') loadPredictHistoryUI();
                    }
                }));
            }

            function init() {
                initTabs();
                renderAlgoTabs();
                updateCurrentAlgoUI();
                startCountdown();
                startAutoRefresh(7500);
                loadData();
                loadPredictHistoryUI();
                updateCompensationFromHistory();
                updateStatsPanels();
                updateModelWinrateUI();
                setInterval(() => { updateCompensationFromHistory(); updateStatsPanels(); }, 30000);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
