<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>系统维护中 | API 服务异常</title>

<style>
:root {
  --bg-primary: #06090f;
  --bg-card: rgba(255, 255, 255, 0.03);
  --border-color: rgba(255, 255, 255, 0.06);
  --text-primary: #f0f2f5;
  --text-secondary: #8a8f98;
  --accent: #3b82f6;
  --accent-glow: rgba(59, 130, 246, 0.3);
  --danger: #ff4757;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow: hidden; /* 防止滚动条破坏沉浸感 */
}

/* ===== 动态背景 ===== */
.background {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -1;
  background: radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
              var(--bg-primary);
}
.grain {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
  opacity: 0.05;
  z-index: -1;
  pointer-events: none;
}

.container {
  width: 100%;
  max-width: 680px;
  margin: 0 auto;
  padding: 24px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* ===== 状态栏 ===== */
.status-bar {
  width: 100%;
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
  margin-bottom: 48px;
  animation: fadeInDown 0.8s ease-out;
}
.status-indicator {
  display: flex; align-items: center; gap: 8px;
}
.status-dot {
  width: 8px; height: 8px;
  background: var(--danger);
  border-radius: 50%;
  animation: pulse-danger 2s infinite;
  box-shadow: 0 0 10px var(--danger);
}

/* ===== 核心动画区 ===== */
.animation-area {
  position: relative;
  width: 140px; height: 140px;
  margin-bottom: 40px;
}

/* 外层旋转环 */
.ring-outer {
  position: absolute;
  width: 100%; height: 100%;
  border-radius: 50%;
  border: 1px solid rgba(59, 130, 246, 0.2);
  animation: rotate-slow 12s linear infinite;
}
.ring-outer::before {
  content: '';
  position: absolute;
  top: -2px; left: 50%;
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 15px var(--accent);
}

/* 中层环 */
.ring-middle {
  position: absolute;
  top: 15%; left: 15%;
  width: 70%; height: 70%;
  border-radius: 50%;
  border: 1px dashed rgba(139, 92, 246, 0.3);
  animation: rotate-reverse 10s linear infinite;
}

/* 内层脉冲 */
.pulse-core {
  position: absolute;
  top: 30%; left: 30%;
  width: 40%; height: 40%;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  border-radius: 50%;
  animation: pulse-core 3s ease-in-out infinite;
}

/* 图标 */
.icon {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 32px; height: 32px;
  color: var(--accent);
  animation: icon-float 4s ease-in-out infinite;
}

/* ===== 卡片 ===== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  padding: 44px;
  width: 100%;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  animation: fadeInUp 0.8s ease-out 0.2s both;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
}

h1 {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.5px;
  margin-bottom: 12px;
}
.subtitle {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 32px;
}

/* 故障信息 */
.incident {
  background: rgba(255, 71, 87, 0.08);
  border-left: 4px solid var(--danger);
  padding: 20px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.8;
  margin-bottom: 36px;
}
.incident strong { color: var(--text-primary); }

/* 状态流 */
.status-flow {
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  margin-top: 24px;
}
.flow-item {
  text-align: center;
  z-index: 1;
}
.flow-icon {
  width: 40px; height: 40px;
  background: rgba(255,255,255,0.05);
  border-radius: 50%;
  display: grid;
  place-items: center;
  margin: 0 auto 8px;
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-secondary);
}
.flow-item.active .flow-icon {
  background: var(--accent);
  color: white;
  box-shadow: 0 0 20px var(--accent-glow);
}
.flow-label {
  font-size: 12px;
  color: var(--text-secondary);
}
.flow-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  margin: 0 12px;
  position: relative;
  top: -10px;
}

/* 页脚 */
footer {
  margin-top: 48px;
  font-size: 12px;
  color: rgba(255,255,255,0.3);
  animation: fadeIn 1s ease-out 0.8s both;
}

/* ===== 动画定义 ===== */
@keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes rotate-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
@keyframes pulse-core {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.2); opacity: 1; }
}
@keyframes pulse-danger {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.1); }
}
@keyframes icon-float {
  0%, 100% { transform: translate(-50%, -52%); }
  50% { transform: translate(-50%, -48%); }
}
@keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* 响应式 */
@media (max-width: 640px) {
  .card { padding: 32px 24px; }
  h1 { font-size: 20px; }
  .status-flow { flex-wrap: wrap; gap: 16px; }
  .flow-line { display: none; }
}
</style>
</head>

<body>
<div class="background"></div>
<div class="grain"></div>

<div class="container">
  <!-- 状态栏 -->
  <div class="status-bar">
    <div class="status-indicator">
      <span class="status-dot"></span>
      SYSTEM DEGRADED
    </div>
    <div>INCIDENT #API-20260508-001</div>
  </div>

  <!-- 核心动画 -->
  <div class="animation-area">
    <div class="ring-outer"></div>
    <div class="ring-middle"></div>
    <div class="pulse-core"></div>
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866-1.5.45-3.226 2.106-3.226h13.414c1.656 0 2.972 1.726 2.106 3.226L13.5 21.75H10.5L2.697 15.126z" />
    </svg>
  </div>

  <div class="card">
    <!-- 文案 -->
    <h1>API 服务正在持续修复中</h1>
    <p class="subtitle">
      我们的工程师已定位核心故障，正在进行底层重构与热修复。<br/>
      这是一个复杂的系统性问题，我们正在全力以赴。
    </p>

    <!-- 故障详情 -->
    <div class="incident">
      <strong>⚠ 影响范围</strong><br/>
      核心业务接口（/api/v1）及依赖服务<br/><br/>
      <strong>🕒 发生时间</strong><br/>
      2026-05-08 07:42 UTC+8<br/><br/>
      <strong>📌 当前状态</strong><br/>
      已隔离故障节点，正在同步数据一致性
    </div>

    <!-- 进度流 -->
    <div class="status-flow">
      <div class="flow-item active">
        <div class="flow-icon">1</div>
        <div class="flow-label">故障定位</div>
      </div>
      <div class="flow-line"></div>
      <div class="flow-item active">
        <div class="flow-icon">2</div>
        <div class="flow-label">代码回滚</div>
      </div>
      <div class="flow-line"></div>
      <div class="flow-item">
        <div class="flow-icon">3</div>
        <div class="flow-label">灰度发布</div>
      </div>
      <div class="flow-line"></div>
      <div class="flow-item">
        <div class="flow-icon">✓</div>
        <div class="flow-label">全面恢复</div>
      </div>
    </div>
  </div>

  <footer>
    © 2026 Enterprise Platform · All Rights Reserved
  </footer>
</div>

<script>
/**
 * 高级动态效果控制器
 * 1. 鼠标视差效果
 * 2. 模拟实时日志更新（增强真实感）
 */
document.addEventListener('DOMContentLoaded', () => {
  const container = document.querySelector('.container');
  const bg = document.querySelector('.background');

  // 鼠标视差
  document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 20;
    const y = (e.clientY / window.innerHeight - 0.5) * 20;
    container.style.transform = `translate(${x}px, ${y}px)`;
  });

  // 随机更新状态栏时间（模拟实时）
  const incidentDiv = document.querySelector('.incident');
  const originalHTML = incidentDiv.innerHTML;
  const statuses = [
    "正在校验分布式锁状态...",
    "重建数据库连接池...",
    "同步缓存节点数据...",
    "验证 API Gateway 路由..."
  ];
  let statusIndex = 0;

  setInterval(() => {
    statusIndex = (statusIndex + 1) % statuses.length;
    incidentDiv.innerHTML = originalHTML.replace(/📌.*?<br\/>/, `📌 ${statuses[statusIndex]}<br/>`);
  }, 3000);
});
</script>
</body>
</html>
