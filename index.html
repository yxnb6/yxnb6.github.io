<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<h3>GitHub 连接测试</h3>
<button onclick="testSync()">测试同步</button>
<button onclick="testPull()">测试拉取</button>
<pre id="result"></pre>

<script>
const GIST_ID = 'ff10b9019cf3d0cab558ff802e320361';
const TOKEN = 'ghp_z1Lf2GmEk3FrpmB4uvF4rG4o1iDP2i1rL2J3E';
const FILENAME = 'pc28_data.json';

async function testSync() {
    const result = document.getElementById('result');
    result.textContent = '正在测试...';
    
    try {
        const resp = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
            method: 'PATCH',
            headers: {
                'Authorization': `token ${TOKEN}`,
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                files: {
                    [FILENAME]: { content: '{"test":"' + new Date().toISOString() + '"}' }
                }
            })
        });
        
        if (resp.ok) {
            const data = await resp.json();
            result.textContent = '✅ 同步成功！\n' + JSON.stringify(data, null, 2);
        } else {
            result.textContent = '❌ 同步失败: ' + resp.status + '\n' + await resp.text();
        }
    } catch (e) {
        result.textContent = '❌ 错误: ' + e.message;
    }
}

async function testPull() {
    const result = document.getElementById('result');
    result.textContent = '正在拉取...';
    
    try {
        const resp = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
            headers: { 'Authorization': `token ${TOKEN}` }
        });
        
        if (resp.ok) {
            const data = await resp.json();
            result.textContent = '✅ 拉取成功！\n' + JSON.stringify(data, null, 2);
        } else {
            result.textContent = '❌ 拉取失败: ' + resp.status + '\n' + await resp.text();
        }
    } catch (e) {
        result.textContent = '❌ 错误: ' + e.message;
    }
}
</script>
</body>
</html>
